---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: dras
builds:
  - dir: ./dras
    main: ./main.go
    binary: dras
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
archives:
  - name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"
checksum:
  name_template: "checksums.txt"
release:
  disable: true
changelog:
  disable: true