suite: mode advanced
templates:
  - main.yaml
release:
  name: dras
  namespace: monitoring
chart:
  appVersion: v9.9.9
values:
  - values-advanced.yaml
tests:
  - it: renders 1 Service and 2 Deployments (3 docs total)
    asserts:
      - hasDocuments:
          count: 3

  - it: dras container has RENDERER_URL pointing at the renderer Service
    documentIndex: 0
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: dras
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RENDERER_URL
            value: http://dras-renderer.monitoring.svc.cluster.local:8080

  - it: renderer Deployment container env has S3_BUCKET and AWS_REGION
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: dras-renderer
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: S3_BUCKET
            value: unidata-nexrad-level2-chunks
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_REGION
            value: us-east-1

  - it: renderer Service is ClusterIP on port 8080
    documentIndex: 2
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: dras-renderer
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
