suite: mode advanced
templates:
  - main.yaml
release:
  name: dras
  namespace: monitoring
chart:
  appVersion: v9.9.9
values:
  - values-advanced.yaml
tests:
  - it: renders 1 Service + 1 Deployment (single-pod sidecar layout)
    asserts:
      - hasDocuments:
          count: 2

  - it: dras container has RENDERER_URL pointing at localhost (intra-pod loopback)
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RENDERER_URL
            value: http://localhost:8080

  - it: renderer runs as a K8s sidecar (initContainer with restartPolicy Always)
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: renderer
      - equal:
          path: spec.template.spec.initContainers[0].restartPolicy
          value: Always
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: S3_BUCKET
            value: unidata-nexrad-level2-chunks
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: AWS_REGION
            value: us-east-1

  - it: renderer sidecar startup probe gates dras on /healthz Ready
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].startupProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.initContainers[0].startupProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.initContainers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.initContainers[0].readinessProbe.httpGet.path
          value: /healthz

  - it: renderer Service is ClusterIP on port 8080 selecting the dras controller
    documentSelector:
      path: kind
      value: Service
    asserts:
      - equal:
          path: metadata.name
          value: dras-renderer
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.selector["app.kubernetes.io/controller"]
          value: dras

  - it: dras container mounts /tmp at subPath dras
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /tmp
            name: tmp
            subPath: dras

  - it: renderer sidecar mounts /tmp at subPath renderer
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            mountPath: /tmp
            name: tmp
            subPath: renderer

  - it: pod-scoped emptyDir volume backs both /tmp mounts
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir:
              sizeLimit: 256Mi

  - it: pod runs as uid 65532 (uid-agnostic image after #108)
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
