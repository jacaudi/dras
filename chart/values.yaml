# Headline mode toggle. Drives whether the renderer container is included
# in the pod and whether RENDERER_URL is injected into the dras container.
mode: advanced  # one of: standard | advanced

# Global overrides forwarded to bjw-s/common. Required by app-template's name helpers.
global: {}

# Container image refs. This is the operator-facing image-override surface:
#   helm install --set image.dras.tag=v2.7.0 ...
# Empty `tag` defaults to .Chart.AppVersion (the unified release tag).
# The chart helper reads from here and writes through to the containers below;
# do NOT set `image:` under controllers.dras.containers.<name> — those are
# overridden every render.
image:
  dras:
    repository: ghcr.io/jacaudi/dras
    tag: ""                  # "" => .Chart.AppVersion
    pullPolicy: IfNotPresent
  renderer:
    repository: ghcr.io/jacaudi/dras-renderer
    tag: ""                  # "" => .Chart.AppVersion
    pullPolicy: IfNotPresent

# dras-specific config.
dras:
  stationIds: ""             # required; e.g. "KATX,KRAX"
  interval: "10"             # poll interval in minutes

  # Pushover credentials. Reference-only — chart never creates this Secret.
  # Required keys in the Secret: PUSHOVER_API_TOKEN, PUSHOVER_USER_KEY.
  pushover:
    existingSecret: ""       # required; e.g. "dras-pushover"

# Renderer-specific config. Read in advanced mode; ignored in standard mode.
# The renderer always uses anonymous (UNSIGNED) S3 access in v1; no AWS-creds
# values surface today (renderer/src/dras_renderer/app.py hardcodes it).
renderer:
  service:
    port: 8080               # internal service port; not exposed via Ingress
  s3:
    bucket: unidata-nexrad-level2-chunks  # passed as S3_BUCKET env
    region: us-east-1                     # passed as AWS_REGION env

# ── Pass-through overrides into bjw-s app-template ───────────────────────
# Single-pod, two-container layout: the renderer (`dras-lvl2-renderer`) and
# the dras worker (`dras`) share a Pod. dras reaches the renderer over
# loopback — no Service needed for intra-pod traffic. The split-Deployment
# layout pre-#109 was hedged for GPU isolation; Py-ART has no GPU path so
# the split had no payoff and was reversed.
#
# Image is uid-agnostic since #108, so a single pod-level securityContext
# at uid 65532 works for both containers — no per-controller override.
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

controllers:
  dras:
    replicas: 1
    containers:
      dras:
        env: {}              # operator-supplied envs merge with chart-managed ones
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits:   { memory: 64Mi }
        probes:
          liveness:  { enabled: false }
          readiness: { enabled: false }
          startup:   { enabled: false }

    # Native K8s sidecar pattern (≥1.28): an initContainer with
    # `restartPolicy: Always` runs alongside the main containers but
    # the kubelet waits for its `startupProbe` to succeed before
    # starting the next container (here, dras). That's the gate that
    # eliminates the cold-start race — dras only begins polling once
    # the renderer's HTTP listener is verifiably serving /healthz.
    # Without a startupProbe the kubelet only waits for the process to
    # launch (PID 1 alive), which says nothing about the listener.
    #
    # Stripped in standard mode.
    initContainers:
      renderer:
        restartPolicy: Always
        ports:
          - name: http
            containerPort: 8080
        resources:
          # 1.5Gi limit covers Py-ART peak (~1.1Gi) on busy stations.
          # See PR #104 history for profiling notes.
          requests: { cpu: 100m, memory: 512Mi }
          limits:   { memory: 1536Mi }
        probes:
          # Gate on this: dras doesn't start until /healthz is 200.
          # ~5s × 30 = 150s budget covers cold Py-ART/matplotlib
          # import and font cache warm; failures bounce the sidecar.
          startup:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /healthz, port: 8080 }
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /healthz, port: 8080 }
              initialDelaySeconds: 10
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /healthz, port: 8080 }
              periodSeconds: 10

service:
  # Stripped in standard mode. Kept in advanced mode for /metrics scraping
  # and out-of-band debugging via port-forward — not on the dras→renderer
  # hot path, which is intra-pod over localhost now.
  renderer:
    controller: dras
    type: ClusterIP
    suffix: renderer
    ports:
      http:
        port: 8080
        protocol: HTTP
        targetPort: 8080

# ── Volumes ──────────────────────────────────────────────────────────────
persistence:
  # Writable /tmp for both containers in the pod. One emptyDir, two subPath
  # mounts — each container sees its own isolated /tmp under a different
  # subdir of the shared volume. matplotlib stores its font/config cache at
  # MPLCONFIGDIR=/tmp/matplotlib (set in the renderer image) and Py-ART/
  # Cartopy create transient files during a render. dras has no /tmp churn
  # today but a future change could; subPaths keep the two containers'
  # tmp namespaces from ever stepping on each other.
  #
  # Disk-backed by default. Set `medium: Memory` to switch to a tmpfs at
  # the cost of subtracting from the pod's memory budget.
  tmp:
    enabled: true
    type: emptyDir
    sizeLimit: 256Mi
    advancedMounts:
      dras:
        dras:
          - path: /tmp
            subPath: dras
        # Renamed alongside the container at emit time. Stripped in
        # standard mode.
        renderer:
          - path: /tmp
            subPath: renderer

# ── app-template required top-level stubs ────────────────────────────────
# app-template/common iterates these keys directly; they must be present as
# empty maps (not nil) so that range/get operations do not dereference nil.
configMaps: {}
ingress: {}
networkpolicies: {}
rawResources: {}
rbac: {}
route: {}
secrets: {}
serviceAccount: {}
serviceMonitor: {}
