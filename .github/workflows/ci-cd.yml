---
# CI/CD Pipeline for dras
# Runs linting, testing, semantic release, and multi-arch container builds
name: CI/CD

"on":
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one release at a time - queue subsequent runs
concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.2
    permissions:
      contents: read
    with:
      yaml: true
      go: true
      working-directory: dras
    secrets: inherit

  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.20.2
    permissions:
      contents: read
    with:
      test-framework: go
      coverage: true
      working-directory: dras
    secrets: inherit

  release:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@v0.20.2
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      use-github-app: true
      go: true
      goreleaser: true
      extra-plugins: '@semantic-release/changelog @semantic-release/git @semantic-release/exec'
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  # Derive major and major.minor from the released semver so the container
  # image gets the full set of moving tags (v2, v2.3, v2.3.1).
  version-parts:
    needs: [release]
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    outputs:
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}
    steps:
      - id: parse
        env:
          VERSION: ${{ needs.release.outputs.new-release-version }}
        run: |
          echo "major=${VERSION%%.*}" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "$VERSION" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

  # Build and push multi-arch container images. Runs in the same workflow
  # run as `release`, so the skip-ci marker on the release commit doesn't
  # block it. Two parallel jobs, one per image — same release version, same
  # tag set, separate ghcr.io/<repo> and ghcr.io/<repo>-renderer namespaces.
  container-dras:
    needs: [release, version-parts]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@v0.20.2
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image-name: ${{ github.repository }}
      context: dras
      file: dras/Dockerfile
      platforms: linux/amd64,linux/arm64
      push: true
      # dras is a static Go binary; the Dockerfile cross-compiles via
      # GOOS/GOARCH, so the arm64 build doesn't need a native arm runner
      # (no QEMU emulation runs at the Go layer either). Forcing the
      # arm64 build to amd64 saves ~20s of arm-runner provisioning.
      arm64-runner: ubuntu-24.04
      version: ${{ needs.release.outputs.new-release-version-v }}
      tags: |
        ghcr.io/${{ github.repository }}:latest
        ghcr.io/${{ github.repository }}:${{ needs.release.outputs.new-release-version-v }}
        ghcr.io/${{ github.repository }}:v${{ needs.version-parts.outputs.minor }}
        ghcr.io/${{ github.repository }}:v${{ needs.version-parts.outputs.major }}
    secrets: inherit

  container-renderer:
    needs: [release, version-parts]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@v0.20.2
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image-name: ${{ github.repository }}-renderer
      context: renderer
      file: renderer/Dockerfile
      platforms: linux/amd64,linux/arm64
      push: true
      version: ${{ needs.release.outputs.new-release-version-v }}
      tags: |
        ghcr.io/${{ github.repository }}-renderer:latest
        ghcr.io/${{ github.repository }}-renderer:${{ needs.release.outputs.new-release-version-v }}
        ghcr.io/${{ github.repository }}-renderer:v${{ needs.version-parts.outputs.minor }}
        ghcr.io/${{ github.repository }}-renderer:v${{ needs.version-parts.outputs.major }}
    secrets: inherit

  # Package and push the OCI Helm chart at the same release version as the
  # container images. Runs in parallel with container-dras / container-renderer
  # — chart push doesn't depend on container builds (it references the images
  # by tag only). Pass the un-prefixed version (matches Chart.yaml's `version`
  # field exactly); the reusable workflow adds the `v` prefix internally for
  # the OCI tag and for the chart's `app-version`.
  helm-publish:
    needs: [release, version-parts]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-helm-publish.yml@v0.20.2
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ needs.release.outputs.new-release-version }}
    secrets: inherit

  pipeline-summary:
    if: always()
    needs: [lint, test, release, container-dras, container-renderer, helm-publish]
    uses: jacaudi/github-actions/.github/workflows/component-pipeline-summary.yml@v0.20.2
    secrets: inherit
