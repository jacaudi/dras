---
# CI/CD Pipeline for dras
# Runs linting, testing, semantic release, and multi-arch container builds
name: CI/CD

"on":
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one release at a time - queue subsequent runs
concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.1
    permissions:
      contents: read
    with:
      yaml: true
      go: true
    secrets: inherit

  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.20.1
    permissions:
      contents: read
    with:
      test-framework: go
      coverage: true
    secrets: inherit

  release:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@v0.20.1
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      use-github-app: true
      go: true
      goreleaser: true
      extra-plugins: '@semantic-release/changelog @semantic-release/git @semantic-release/exec'
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  # Build and push multi-arch container images. Runs in the same workflow
  # run as `release`, so [skip ci] on the release commit doesn't block it.
  container:
    needs: [release]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@v0.20.1
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      image-name: ${{ github.repository }}
      platforms: linux/amd64,linux/arm64
      push: true
      version: ${{ needs.release.outputs.new-release-version-v }}
      tags: |
        ghcr.io/${{ github.repository }}:${{ needs.release.outputs.new-release-version-v }}
        ghcr.io/${{ github.repository }}:latest
    secrets: inherit

  pipeline-summary:
    if: always()
    needs: [lint, test, release, container]
    uses: jacaudi/github-actions/.github/workflows/component-pipeline-summary.yml@v0.20.1
    secrets: inherit
