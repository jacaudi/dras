---
name: On Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.16.1
    with:
      go: true
    secrets: inherit

  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.16.1
    with:
      test-framework: go
      coverage: true
    secrets: inherit
