---
# Pull Request Validation
# Fast feedback on PRs: lint, test, and no-push container builds
name: PR Validation

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint Code
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.1
    with:
      yaml: true
      go: true
      working-directory: dras

  test:
    name: Run Tests
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.20.1
    with:
      test-framework: go
      coverage: true
      working-directory: dras

  lint-renderer:
    name: Lint Renderer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: renderer
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - name: Sync deps
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy
        run: uv run mypy src

  test-renderer:
    name: Test Renderer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: renderer
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - name: Sync deps
        run: uv sync --frozen
      - name: Pytest
        run: uv run pytest -v

  # Validate Dockerfile builds for both architectures (no push)
  container-amd64:
    name: Build Container (amd64)
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (amd64)
        uses: docker/build-push-action@v7
        with:
          context: dras
          file: dras/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: dras:pr-${{ github.event.pull_request.number }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  container-arm64:
    name: Build Container (arm64)
    needs: [lint, test]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (arm64)
        uses: docker/build-push-action@v7
        with:
          context: dras
          file: dras/Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: dras:pr-${{ github.event.pull_request.number }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  container-renderer-amd64:
    name: Build Renderer Container (amd64)
    needs: [lint-renderer, test-renderer]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (amd64)
        uses: docker/build-push-action@v7
        with:
          context: renderer
          file: renderer/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: dras-renderer:pr-${{ github.event.pull_request.number }}-amd64
          cache-from: type=gha,scope=renderer-amd64
          cache-to: type=gha,mode=max,scope=renderer-amd64

  container-renderer-arm64:
    name: Build Renderer Container (arm64)
    needs: [lint-renderer, test-renderer]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (arm64)
        uses: docker/build-push-action@v7
        with:
          context: renderer
          file: renderer/Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: dras-renderer:pr-${{ github.event.pull_request.number }}-arm64
          cache-from: type=gha,scope=renderer-arm64
          cache-to: type=gha,mode=max,scope=renderer-arm64

  helm-validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect chart changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            chart:
              - 'chart/**'
              - 'scripts/sync-chart-version*.sh'
              - '.releaserc.json'

      - name: Set up Helm
        if: steps.changes.outputs.chart == 'true'
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Install helm-unittest plugin
        if: steps.changes.outputs.chart == 'true'
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3

      - name: Install kubeconform
        if: steps.changes.outputs.chart == 'true'
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Helm dependency update
        if: steps.changes.outputs.chart == 'true'
        run: helm dependency update chart/

      - name: Helm lint (strict)
        if: steps.changes.outputs.chart == 'true'
        run: helm lint chart/ --strict

      - name: helm-unittest
        if: steps.changes.outputs.chart == 'true'
        run: helm unittest chart/

      - name: Helm template — standard mode | kubeconform
        if: steps.changes.outputs.chart == 'true'
        run: |
          helm template dras chart/ -f chart/tests/values-standard.yaml --namespace monitoring \
            | kubeconform -strict -summary -kubernetes-version 1.30.0

      - name: Helm template — advanced mode | kubeconform
        if: steps.changes.outputs.chart == 'true'
        run: |
          helm template dras chart/ -f chart/tests/values-advanced.yaml --namespace monitoring \
            | kubeconform -strict -summary -kubernetes-version 1.30.0

      - name: sync-chart-version.sh self-test
        if: steps.changes.outputs.chart == 'true'
        run: bash scripts/sync-chart-version_test.sh
