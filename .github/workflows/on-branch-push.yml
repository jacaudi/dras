---
name: On Branch Push

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.16.1
    with:
      go: true
    secrets: inherit

  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.16.1
    with:
      test-framework: go
      coverage: true
    secrets: inherit
