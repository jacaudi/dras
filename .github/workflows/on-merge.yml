---
name: On Merge

on:
  push:
    branches:
      - main

concurrency:
  group: on-merge
  cancel-in-progress: false

jobs:
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.17.0
    with:
      go: true
    secrets: inherit

  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.17.0
    with:
      test-framework: go
      coverage: true
    secrets: inherit

  approve:
    name: Approve Release
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Release approved
        run: echo "Release approved, proceeding with semantic-release..."

  release:
    needs: [approve]
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@v0.17.0
    with:
      use-github-app: true
      go: true
      goreleaser: true
      extra-plugins: '@semantic-release/changelog @semantic-release/git @semantic-release/exec'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  pipeline-summary:
    if: always()
    needs: [lint, test, approve, release]
    uses: jacaudi/github-actions/.github/workflows/component-pipeline-summary.yml@v0.17.0
    secrets: inherit
